---
- name: Remote backup, add timezone, restart stacks, and report changes
  hosts: all     # <-- Replace this with your inventory group name
  become: true
  gather_facts: yes          # <-- Required to pull timestamps from the remote machine
  vars:
    target_dir: /krabs-data/krabs-docker
    timezone: "America/New_York"

  tasks:
    - name: Find all docker-compose.yaml files in first-level subdirectories
      ansible.builtin.find:
        paths: "{{ target_dir }}"
        recurse: yes
        depth: 2
        patterns: "docker-compose.yaml"
      register: compose_files

    - name: Create a backup of each docker-compose.yaml file on the remote target
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "{{ item.path }}.{{ ansible_date_time.date }}_{{ ansible_date_time.hour }}{{ ansible_date_time.minute }}{{ ansible_date_time.second }}.bak"
        remote_src: yes
      # Drops any paths containing 'ansible-semaphore' or 'nginx-proxy-manager'
      loop: "{{ compose_files.files | rejectattr('path', 'regex', 'ansible-semaphore|nginx-proxy-manager') | list }}"
      loop_control:
        label: "{{ item.path }}"

    - name: Append TZ environment variable safely via native inline Python lines manipulation
      ansible.builtin.shell: |
        python3 -c "
        import sys
        path = '{{ item.path }}'
        with open(path, 'r') as f:
            lines = f.readlines()
        
        output = []
        changed = False
        in_env_block = False
        env_indent = 0
        has_tz = False
        
        # Scan if file already contains our exact timezone configuration
        content_str = ''.join(lines)
        if 'TZ={{ timezone }}' in content_str:
            sys.exit(0)
            
        for line in lines:
            stripped = line.strip()
            indent = len(line) - len(line.lstrip())
            
            # If we were tracking an environment block, check if it just ended
            if in_env_block and stripped and indent <= env_indent and not stripped.startswith('-'):
                if not has_tz:
                    output.append(' ' * (env_indent + 2) + '- TZ={{ timezone }}\n')
                    changed = True
                in_env_block = False
                has_tz = False
                
            output.append(line)
            
            # Check if this line opens up a service environment layout block
            if stripped.startswith('environment:'):
                in_env_block = True
                env_indent = indent
                has_tz = False
                # Handle single line short form declarations like: environment: []
                if stripped.endswith('[]') or stripped.endswith('{}'):
                    output.pop()
                    output.append(' ' * indent + 'environment:\n')
                    output.append(' ' * (indent + 2) + '- TZ={{ timezone }}\n')
                    changed = True
                    in_env_block = False
            
            if in_env_block and ('TZ=' in stripped or 'TZ:' in stripped):
                has_tz = True
                
        # Catch lingering environments sitting directly at the absolute end of files
        if in_env_block and not has_tz:
            output.append(' ' * (env_indent + 2) + '- TZ={{ timezone }}\n')
            changed = True
            
        if changed:
            with open(path, 'w') as f:
                f.writelines(output)
            print('STACK_CHANGED')
        "
      # Safely checks the stdout text loop data directly instead of its return code
      changed_when: "'STACK_CHANGED' in compose_update.results[ansible_loop_index | default(0)].stdout | default('')"
      # Drops any paths containing 'ansible-semaphore' or 'nginx-proxy-manager'
      loop: "{{ compose_files.files | rejectattr('path', 'regex', 'ansible-semaphore|nginx-proxy-manager') | list }}"
      loop_control:
        label: "{{ item.path }}"
        index_var: ansible_loop_index
      register: compose_update

    - name: Restart updated containers
      community.docker.docker_compose_v2:
        project_src: "{{ item.item.path | dirname }}"
        state: present
        build: never
        recreate: always
      loop: "{{ compose_update.results }}"
      loop_control:
        label: "{{ item.item.path }}"
      when: item.changed

    - name: Generate clean updated containers report
      ansible.builtin.debug:
        msg: |
          ----------------------------------
          {{ inventory_hostname }}
          ----------------------------------
          {% for item in compose_update.results | selectattr('changed', 'equalto', true) | map(attribute='item.path') | map('dirname') | map('basename') | sort -%}
          Updated: {{ item }}
          {% endfor %}
      when: compose_update.results | selectattr('changed', 'equalto', true) | list | length > 0

    - name: Generate clean no-change report
      ansible.builtin.debug:
        msg: |
          ----------------------------------
          {{ inventory_hostname }}
          ----------------------------------
          Status: No changes made. All stacks already configured with TZ={{ timezone }}.
      when: compose_update.results | selectattr('changed', 'equalto', true) | list | length == 0
