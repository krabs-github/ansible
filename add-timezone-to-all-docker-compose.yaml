---
- name: Backup, add timezone, restart stacks, and report changes
  hosts: localhost
  connection: local
  vars:
    target_dir: /krabs-data/krabs-docker
    timezone: "America/New_York"
    # Generates a timestamp (e.g., 20260620-090415)
    timestamp: "{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"

  tasks:
    - name: Find all docker-compose.yaml files in subdirectories
      ansible.builtin.find:
        paths: "{{ target_dir }}"
        recurse: yes
        patterns: "docker-compose.yaml"
      register: compose_files

    - name: Create a backup of each docker-compose.yaml file
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "{{ item.path }}.{{ timestamp }}.bak"
        remote_src: yes
      loop: "{{ compose_files.files }}"
      loop_control:
        label: "{{ item.path }}"

    - name: Append TZ environment variable to services
      ansible.builtin.lineinfile:
        path: "{{ item.path }}"
        insertafter: '^[ \t]*environment:[ \t]*$'
        line: "      - TZ={{ timezone }}"
        state: present
      loop: "{{ compose_files.files }}"
      loop_control:
        label: "{{ item.path }}"
      register: compose_update

    - name: Restart updated containers
      community.docker.docker_compose_v2:
        project_src: "{{ item.item.path | dirname }}"
        state: present
        build: never
        recreate: always
      loop: "{{ compose_update.results }}"
      loop_control:
        label: "{{ item.item.path }}"
      when: item.changed

    - name: Generate updated containers report
      ansible.builtin.debug:
        msg: >-
          The following compose files were successfully updated with TZ={{ timezone }} and restarted:
          {{ compose_update.results | selectattr('changed', 'equalto', true) | map(attribute='item.path') | list }}
      when: compose_update.results | selectattr('changed', 'equalto', true) | list | length > 0

    - name: Generate no-change report
      ansible.builtin.debug:
        msg: "No changes made. All files already contain the TZ={{ timezone }} code."
      when: compose_update.results | selectattr('changed', 'equalto', true) | list | length == 0
