---
- name: Configure Ubuntu VM - QEMU Agent and fstrim
  hosts: all
  become: true
  tasks:
    - name: Ensure qemu-guest-agent is installed
      ansible.builtin.apt:
        name: qemu-guest-agent
        state: present
        update_cache: true

    - name: Ensure fstrim.timer service is enabled and started
      ansible.builtin.systemd:
        name: fstrim.timer
        enabled: true
        state: started

    - name: Verify qemu-guest-agent service status
      ansible.builtin.service:
        name: qemu-guest-agent
        state: started
        enabled: true
