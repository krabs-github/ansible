---
- name: Configure Systemd Resolved DNS
  hosts: all
  become: true  # 'become: true' ensures these tasks run with root/sudo privileges

  # -------------------------------------------------------------------------
  # VARIABLES
  # -------------------------------------------------------------------------
  vars:
    # We define the DNS IP addresses here as variables.
    # This allows you to change the IPs in one place without having to edit 
    # the large text block below.
    dns_server_primary: "192.168.86.4"
    dns_server_fallback: "192.168.86.6"

  tasks:
    # -------------------------------------------------------------------------
    # MAIN CONFIGURATION TASK
    # -------------------------------------------------------------------------
    - name: Update /etc/systemd/resolved.conf
      ansible.builtin.copy:
        dest: /etc/systemd/resolved.conf
        owner: root
        group: root
        mode: '0644' # Permissions: Read/Write for root, Read-only for everyone else
        
        # 'notify' is a special Ansible feature. 
        # It tells Ansible: "If (and ONLY if) this task changes the file,
        # trigger the 'Restart systemd-resolved' handler at the end of the play."
        # If the file is already correct, the service will not be restarted.
        notify: Restart systemd-resolved
        
        # The 'content' block defines exactly what the file should look like.
        # We use {{ variable_name }} to inject the IPs defined at the top.
        content: |
          # This file is part of systemd.
          #
          # systemd is free software; you can redistribute it and/or modify it under the
          # terms of the GNU Lesser General Public License as published by the Free
          # Software Foundation; either version 2.1 of the License, or (at your option)
          # any later version.
          #
          # Entries in this file show the compile time defaults. Local configuration
          # should be created by either modifying this file, or by creating "drop-ins" in
          # the resolved.conf.d/ subdirectory. The latter is generally recommended.
          # Defaults can be restored by simply deleting this file and all drop-ins.
          #
          # Use 'systemd-analyze cat-config systemd/resolved.conf' to display the full config.
          #
          # See resolved.conf(5) for details.

          [Resolve]
          # Some examples of DNS servers which may be used for DNS= and FallbackDNS=:
          # Cloudflare: 1.1.1.1#cloudflare-dns.com 1.0.0.1#cloudflare-dns.com 2606:4700:4700::1111#cloudflare-dns.com 2606:4700:4700::1001#cloudflare-dns.com
          # Google:     8.8.8.8#dns.google 8.8.4.4#dns.google 2001:4860:4860::8888#dns.google 2001:4860:4860::8844#dns.google
          # Quad9:      9.9.9.9#dns.quad9.net 149.112.112.112#dns.quad9.net 2620:fe::fe#dns.quad9.net 2620:fe::9#dns.quad9.net
          DNS={{ dns_server_primary }}
          FallbackDNS={{ dns_server_fallback }}
          #Domains=
          #DNSSEC=no
          #DNSOverTLS=no
          #MulticastDNS=no
          #LLMNR=no
          #Cache=no-negative
          #CacheFromLocalhost=no
          #DNSStubListener=yes
          #DNSStubListenerExtra=
          #ReadEtcHosts=yes
          #ResolveUnicastSingleLabel=no

  # -------------------------------------------------------------------------
  # HANDLERS
  # -------------------------------------------------------------------------
  handlers:
    # Handlers are only run if a task triggers them using 'notify'.
    - name: Restart systemd-resolved
      ansible.builtin.service:
        name: systemd-resolved
        state: restarted
        enabled: true