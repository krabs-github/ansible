---
- name: Set and verify timezone for all running Docker containers on multiple hosts
  hosts:
    - server01.krabs.me
    - server04.krabs.me
  become: yes
  vars:
    # Centralized list to manually exclude specific container names
    skipped_containers:
      - "portainer_agent"
      - "another_container_to_skip"

  tasks:
    - name: Get list of running container IDs and names
      ansible.builtin.shell: |
        docker ps --format '{% raw %}{{.ID}}{% endraw %}\t{% raw %}{{.Names}}{% endraw %}'
      register: running_containers
      changed_when: false

    - name: Debug - Show raw output from docker ps (for troubleshooting)
      ansible.builtin.debug:
        var: running_containers.stdout_lines
        verbosity: 1

    - name: Set timezone in each running container
      when: running_containers.stdout_lines is defined and running_containers.stdout_lines | length > 0
      loop: "{{ running_containers.stdout_lines }}"
      environment:
        SKIPPED_LIST: "{{ skipped_containers | join(' ') }}"
      ansible.builtin.shell:
        cmd: |
          LINE="{{ item }}"
          CONTAINER_ID=$(echo "$LINE" | cut -f1)
          CONTAINER_NAME=$(echo "$LINE" | cut -f2)
          TARGET_TIMEZONE="America/New_York"
          ZONEINFO_PATH="/usr/share/zoneinfo/$TARGET_TIMEZONE"

          if [ -z "$CONTAINER_ID" ] || [ -z "$CONTAINER_NAME" ]; then
              exit 0
          fi

          # Check if the container name matches the exclusion list
          for skip_name in $SKIPPED_LIST; do
              if [ "$CONTAINER_NAME" = "$skip_name" ]; then
                  echo "STATUS: UNCHANGED (Excluded via skip list)"
                  exit 0
              fi
          done

          # 0. DISTROLESS / SCRATCH ENVIRONMENT SANITY CHECK
          if ! docker exec "$CONTAINER_ID" true >/dev/null 2>&1 && ! docker exec "$CONTAINER_ID" sh -c "true" >/dev/null 2>&1; then
              echo "STATUS: UNCHANGED (Distroless / No internal shell)"
              exit 0
          fi

          # 1. ALPINE DETECTION & CONFIGURATION
          if docker exec "$CONTAINER_ID" grep -qi "alpine" /etc/os-release >/dev/null 2>&1; then
              if ! docker exec -u 0 "$CONTAINER_ID" sh -c "touch /etc/timezone" >/dev/null 2>&1; then
                  echo "STATUS: UNCHANGED (Read-Only Filesystem)"
                  exit 0
              fi

              docker exec -u 0 "$CONTAINER_ID" apk add --no-cache tzdata >/dev/null 2>&1
              docker exec -u 0 "$CONTAINER_ID" rm -f /etc/localtime
              docker exec -u 0 "$CONTAINER_ID" cp "$ZONEINFO_PATH" /etc/localtime
              docker exec -u 0 "$CONTAINER_ID" sh -c "echo '$TARGET_TIMEZONE' > /etc/timezone"
              echo "STATUS: CHANGED"

          # 2. UBUNTU / DEBIAN / FALLBACK METHODS
          elif docker exec "$CONTAINER_ID" command -v setup-timezone >/dev/null 2>&1; then
              docker exec -u 0 "$CONTAINER_ID" setup-timezone -z "$TARGET_TIMEZONE" >/dev/null 2>&1
              echo "STATUS: CHANGED"
              
          elif docker exec "$CONTAINER_ID" test -f /etc/timezone; then
              docker exec -u 0 "$CONTAINER_ID" sh -c "rm -f /etc/localtime && echo '$TARGET_TIMEZONE' > /etc/timezone && cp \"$ZONEINFO_PATH\" /etc/localtime" >/dev/null 2>&1
              echo "STATUS: CHANGED"
              
          elif docker exec "$CONTAINER_ID" test -d /usr/share/zoneinfo/"$(dirname "$TARGET_TIMEZONE")"; then
              docker exec -u 0 "$CONTAINER_ID" sh -c "rm -f /etc/localtime && ln -sf \"$ZONEINFO_PATH\" /etc/localtime" >/dev/null 2>&1
              echo "STATUS: CHANGED"
              
          else
              echo "STATUS: UNCHANGED (No configuration method found)"
          fi
      register: timezone_change_status
      changed_when: false

    - name: Report current timezone for each container
      when: running_containers.stdout_lines is defined and running_containers.stdout_lines | length > 0
      loop: "{{ running_containers.stdout_lines }}"
      environment:
        SKIPPED_LIST: "{{ skipped_containers | join(' ') }}"
      ansible.builtin.shell:
        cmd: |
          LINE="{{ item }}"
          CONTAINER_ID=$(echo "$LINE" | cut -f1)
          CONTAINER_NAME=$(echo "$LINE" | cut -f2)
          
          CURRENT_DATE="[Cannot read time internally]"

          # Check exclusions to stay silent or return static labels
          for skip_name in $SKIPPED_LIST; do
              if [ "$CONTAINER_NAME" = "$skip_name" ]; then
                  echo "TIME: N/A"
                  exit 0
              fi
          done

          if ! docker exec "$CONTAINER_ID" true >/dev/null 2>&1 && ! docker exec "$CONTAINER_ID" sh -c "true" >/dev/null 2>&1; then
              echo "TIME: N/A"
              exit 0
          fi

          DATE_CMD=""
          if docker exec "$CONTAINER_ID" command -v date >/dev/null 2>&1; then
              DATE_CMD="date"
          elif docker exec "$CONTAINER_ID" test -f /bin/date; then
              DATE_CMD="/bin/date"
          elif docker exec "$CONTAINER_ID" test -f /usr/bin/date; then
              DATE_CMD="/usr/bin/date"
          elif docker exec "$CONTAINER_ID" command -v busybox >/dev/null 2>&1; then
              DATE_CMD="busybox date"
          fi

          if [ -n "$DATE_CMD" ]; then
              CURRENT_DATE=$(docker exec -u 0 "$CONTAINER_ID" $DATE_CMD 2>/dev/null)
          fi
          
          echo "TIME: $CURRENT_DATE"
      register: timezone_report
      changed_when: false

    - name: Display human-readable sorted timezone report
      ansible.builtin.debug:
        msg: |
          ======================================================================
                         CONTAINER TIMEZONE REPORT (ALPHABETICAL)
          ======================================================================
          {# 1. Build a structured list of container objects #}
          {% set container_list = [] %}
          {% for run in timezone_report.results if run.skipped is not defined %}
            {% set name = run.item.split('\t') | default('Unknown') %}
            {% set id = run.item.split('\t') | default('Unknown') %}
            {% set time_line = run.stdout_lines | select('match', '^TIME: .*') | first | default('TIME: N/A') %}
            {% set time_val = time_line | replace('TIME: ', '') %}
            
            {% set change_task = timezone_change_status.results[loop.index0] %}
            {% set status_line = change_task.stdout_lines | select('match', '^STATUS: .*') | first | default('STATUS: OK') %}
            {% set status_val = status_line | replace('STATUS: ', '') %}
            
            {% set _ = container_list.append({'name': name, 'id': id, 'time': time_val, 'status': status_val}) %}
          {% endfor %}
          
          {# 2. Loop through the built list, sorting by the 'name' attribute #}
          {% for container in container_list | sort(attribute='name') %}
          {% if 'UNCHANGED' in container.status %}
          {# ANSI Yellow escape sequences #}
          {% set colored_status = "\u001b[33m" ~ container.status ~ "\u001b[0m" %}
          {% elif 'CHANGED' in container.status %}
          {# ANSI Green escape sequences #}
          {% set colored_status = "\u001b[32m" ~ container.status ~ "\u001b[0m" %}
          {% else %}
          {% set colored_status = container.status %}
          {% endif %}
          Container Name : {{ container.name }}
          Container ID   : {{ container.id }}
          Current Time   : {{ container.time }}
          Final Status   : {{ colored_status }}
          ----------------------------------------------------------------------
          {% endfor %}
      when: timezone_report.results is defined
