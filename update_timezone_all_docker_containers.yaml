---
- name: Set and verify timezone for all running Docker containers on multiple hosts
  hosts:
    - server01.krabs.me
    - server04.krabs.me
  become: yes
  vars:
    # Centralized list to manually exclude specific container names
    skipped_containers:
      - "portainer_agent"
      - "another_container_to_skip"

  tasks:
    - name: Get list of running container IDs and names
      ansible.builtin.shell: |
        docker ps --format '{% raw %}{{.ID}}{% endraw %}\t{% raw %}{{.Names}}{% endraw %}'
      register: running_containers
      changed_when: false

    - name: Debug - Show raw output from docker ps (for troubleshooting)
      ansible.builtin.debug:
        var: running_containers.stdout_lines

    - name: Set timezone in each running container
      when: running_containers.stdout_lines is defined and running_containers.stdout_lines | length > 0
      loop: "{{ running_containers.stdout_lines }}"
      environment:
        SKIPPED_LIST: "{{ skipped_containers | join(' ') }}"
      ansible.builtin.shell:
        cmd: |
          LINE="{{ item }}"
          CONTAINER_ID=$(echo "$LINE" | cut -f1)
          CONTAINER_NAME=$(echo "$LINE" | cut -f2)
          TARGET_TIMEZONE="America/New_York"
          ZONEINFO_PATH="/usr/share/zoneinfo/$TARGET_TIMEZONE"

          if [ -z "$CONTAINER_ID" ] || [ -z "$CONTAINER_NAME" ]; then
              echo "Skipping malformed line: '$LINE' - Missing ID or Name after parsing."
              exit 0
          fi

          # Check if the container name matches the exclusion list
          for skip_name in $SKIPPED_LIST; do
              if [ "$CONTAINER_NAME" = "$skip_name" ]; then
                  echo "Skipping container '$CONTAINER_NAME' as requested in skip list."
                  exit 0
              fi
          done

          echo "Processing container: $CONTAINER_NAME ($CONTAINER_ID)"

          # 1. ALPINE DETECTION & CONFIGURATION
          if docker exec "$CONTAINER_ID" grep -qi "alpine" /etc/os-release >/dev/null 2>&1; then
              echo " Method: Configuring Alpine Linux for $CONTAINER_NAME"
              
              # Gracefully skip if the container filesystem is mounted as read-only
              if ! docker exec -u 0 "$CONTAINER_ID" sh -c "touch /etc/timezone" >/dev/null 2>&1; then
                  echo " WARNING: Container '$CONTAINER_NAME' filesystem is Read-Only. Cannot modify timezone in-place."
                  exit 0
              fi

              docker exec -u 0 "$CONTAINER_ID" apk add --no-cache tzdata >/dev/null
              # Remove old files first to avoid 'File exists' errors
              docker exec -u 0 "$CONTAINER_ID" rm -f /etc/localtime
              docker exec -u 0 "$CONTAINER_ID" cp "$ZONEINFO_PATH" /etc/localtime
              docker exec -u 0 "$CONTAINER_ID" sh -c "echo '$TARGET_TIMEZONE' > /etc/timezone"

          # 2. UBUNTU / DEBIAN / FALLBACK METHODS
          elif docker exec "$CONTAINER_ID" command -v setup-timezone >/dev/null 2>&1; then
              echo " Method: Using 'setup-timezone' for $CONTAINER_NAME"
              docker exec -u 0 "$CONTAINER_ID" setup-timezone -z "$TARGET_TIMEZONE"
              
          elif docker exec "$CONTAINER_ID" test -f /etc/timezone; then
              echo " Method: Manually setting timezone via /etc/timezone (Ubuntu/Debian style) for $CONTAINER_NAME"
              # Remove old files first to prevent conflicts with pre-existing symlinks
              docker exec -u 0 "$CONTAINER_ID" sh -c "rm -f /etc/localtime && echo '$TARGET_TIMEZONE' > /etc/timezone && cp \"$ZONEINFO_PATH\" /etc/localtime"
              
          elif docker exec "$CONTAINER_ID" test -d /usr/share/zoneinfo/"$(dirname "$TARGET_TIMEZONE")"; then
              echo " Method: Setting timezone via /etc/localtime symlink for $CONTAINER_NAME"
              docker exec -u 0 "$CONTAINER_ID" sh -c "rm -f /etc/localtime && ln -sf \"$ZONEINFO_PATH\" /etc/localtime"
              
          else
              echo " Could not determine a suitable timezone setup method or zoneinfo files for $CONTAINER_NAME. Skipping."
          fi
      changed_when: false

    - name: Report current timezone for each container
      when: running_containers.stdout_lines is defined and running_containers.stdout_lines | length > 0
      loop: "{{ running_containers.stdout_lines }}"
      environment:
        SKIPPED_LIST: "{{ skipped_containers | join(' ') }}"
      ansible.builtin.shell:
        cmd: |
          LINE="{{ item }}"
          CONTAINER_ID=$(echo "$LINE" | cut -f1)
          CONTAINER_NAME=$(echo "$LINE" | cut -f2)

          if [ -z "$CONTAINER_ID" ] || [ -z "$CONTAINER_NAME" ]; then
              echo "Skipping malformed line for reporting: '$LINE'"
              exit 0
          fi

          # Skip reporting for explicitly excluded containers
          for skip_name in $SKIPPED_LIST; do
              if [ "$CONTAINER_NAME" = "$skip_name" ]; then
                  exit 0
              fi
          done

          echo "Container '$CONTAINER_NAME' (ID: $CONTAINER_ID):"

          DATE_CMD=""
          if docker exec "$CONTAINER_ID" command -v date >/dev/null 2>&1; then
              DATE_CMD="date"
          elif docker exec "$CONTAINER_ID" test -f /bin/date; then
              DATE_CMD="/bin/date"
          elif docker exec "$CONTAINER_ID" test -f /usr/bin/date; then
              DATE_CMD="/usr/bin/date"
          elif docker exec "$CONTAINER_ID" command -v busybox >/dev/null 2>&1; then
              DATE_CMD="busybox date"
          fi

          if [ -n "$DATE_CMD" ]; then
              echo " Running: docker exec -u 0 \"$CONTAINER_ID\" $DATE_CMD"
              docker exec -u 0 "$CONTAINER_ID" $DATE_CMD
          else
              echo " WARNING: 'date' command (or busybox) not found in container. Cannot report timezone."
              exit 0
          fi
      register: timezone_report
      changed_when: false

    - name: Display timezone report
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ timezone_report.results }}"
      loop_control:
        label: "{{ item.item.split('\t') | default(item.item) }}"
      when: item.skipped is not defined and item.stdout_lines is defined and item.stdout_lines | length > 0
