---
- name: Set and verify timezone for all running Docker containers on multiple hosts
  hosts:
    - server01.krabs.me
    - server04.krabs.me
  become: yes # Ensures Ansible connects as a user with sudo privileges on the host

  tasks:
    - name: Get list of running container IDs and names
      ansible.builtin.shell: |
        docker ps --format '{% raw %}{{.ID}}{% endraw %}\t{% raw %}{{.Names}}{% endraw %}'
      register: running_containers
      changed_when: false # This task only gathers info, doesn't change anything

    - name: Debug - Show raw output from docker ps (for troubleshooting)
      ansible.builtin.debug:
        var: running_containers.stdout_lines
      # You can remove or comment out this debug task once everything is working reliably.

    - name: Set timezone in each running container
      when: running_containers.stdout_lines is defined and running_containers.stdout_lines | length > 0
      loop: "{{ running_containers.stdout_lines }}"
      ansible.builtin.shell:
        cmd: |
          LINE="{{ item }}" # Ansible loop item (e.g., "id123\tcontainer_name")
          CONTAINER_ID=$(echo "$LINE" | cut -f1) # Extract ID using shell command
          CONTAINER_NAME=$(echo "$LINE" | cut -f2) # Extract Name using shell command
          TARGET_TIMEZONE="America/New_York"
          ZONEINFO_PATH="/usr/share/zoneinfo/$TARGET_TIMEZONE"

          # Basic validation for malformed lines
          if [ -z "$CONTAINER_ID" ] || [ -z "$CONTAINER_NAME" ]; then
            echo "Skipping malformed line: '$LINE' - Missing ID or Name after parsing. This might indicate an issue with docker ps --format output or no running containers."
            exit 0 # Exit successfully for this item, as it's a skip
          fi

          echo "Processing container: $CONTAINER_NAME ($CONTAINER_ID)"

          # --- Timezone setting logic ---

          # 1. Attempt to use 'setup-timezone' (common in some Alpine images)
          if docker exec "$CONTAINER_ID" command -v setup-timezone >/dev/null 2>&1; then
            echo "  Method: Using 'setup-timezone' for $CONTAINER_NAME"
            docker exec -u 0 "$CONTAINER_ID" setup-timezone -z "$TARGET_TIMEZONE"

          # 2. Attempt to use '/etc/timezone' file (common in Ubuntu/Debian-based images)
          elif docker exec "$CONTAINER_ID" test -f /etc/timezone; then
            echo "  Method: Manually setting timezone via /etc/timezone (Ubuntu/Debian style) for $CONTAINER_NAME"
            docker exec -u 0 "$CONTAINER_ID" sh -c "echo '$TARGET_TIMEZONE' > /etc/timezone && cp \"$ZONEINFO_PATH\" /etc/localtime"

          # 3. Fallback: Use symlink to /etc/localtime (common for minimal Alpine images without setup-timezone)
          elif docker exec "$CONTAINER_ID" test -d /usr/share/zoneinfo/"$(dirname "$TARGET_TIMEZONE")"; then
            echo "  Method: Setting timezone via /etc/localtime symlink (Alpine style fallback) for $CONTAINER_NAME"
            docker exec -u 0 "$CONTAINER_ID" sh -c "
              rm -f /etc/localtime && \
              ln -sf \"$ZONEINFO_PATH\" /etc/localtime
            "
          # 4. If no method works
          else
            echo "  Could not determine a suitable timezone setup method or zoneinfo files for $CONTAINER_NAME. Skipping."
          fi
      changed_when: false # Set to false as the shell command reports its own changes, not Ansible's direct state change

    - name: Report current timezone for each container
      # This task runs after attempting to set timezones.
      # It will gather and display the effective timezone.
      when: running_containers.stdout_lines is defined and running_containers.stdout_lines | length > 0
      loop: "{{ running_containers.stdout_lines }}"
      ansible.builtin.shell:
        cmd: |
          LINE="{{ item }}" # Ansible loop item (e.g., "id123\tcontainer_name")
          CONTAINER_ID=$(echo "$LINE" | cut -f1)
          CONTAINER_NAME=$(echo "$LINE" | cut -f2)

          if [ -z "$CONTAINER_ID" ] || [ -z "$CONTAINER_NAME" ]; then
            echo "Skipping malformed line for reporting: '$LINE'"
            exit 0
          fi

          # Use shell variables for output formatting
          echo "Container '$CONTAINER_NAME' (ID: $CONTAINER_ID):"
          # Execute 'date' inside the container to get its current time and timezone
          # -u 0 (root) ensures permissions to run date in all cases
          docker exec -u 0 "$CONTAINER_ID" date
      register: timezone_report
      changed_when: false # This task only reports, does not change state

    - name: Display timezone report
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines }}" # Display the stdout (date output) for each container
      loop: "{{ timezone_report.results }}"
      loop_control:
        label: "{{ item.item.split('\t')[1] | default(item.item) }}" # Use container name for readable labels
      when: item.skipped is not defined and item.stdout_lines is defined # Only show valid reports