- name: Set timezone for all running Docker containers on multiple hosts using raw docker commands
  hosts:
    - server01.krabs.me
    - server04.krabs.me
  become: yes
  tasks:
    - name: Get list of running container IDs and names
      ansible.builtin.shell: |
        docker ps --format '{% raw %}{{.ID}}{% endraw %}\t{% raw %}{{.Names}}{% endraw %}'
      register: running_containers
      changed_when: false

    - name: Debug - Show raw output from docker ps
      ansible.builtin.debug:
        var: running_containers.stdout_lines

    - name: Set timezone in each running container
      when: running_containers.stdout_lines is defined and running_containers.stdout_lines | length > 0
      loop: "{{ running_containers.stdout_lines }}"
      # We will construct the entire shell command as a Jinja2 expression
      # and pass it to the 'cmd' parameter for clarity, or just directly to 'shell'
      ansible.builtin.shell:
        cmd: |
          # Use shell string manipulation to parse item, passed as an argument
          LINE="{{ item }}"
          CONTAINER_ID=$(echo "$LINE" | cut -f1)
          CONTAINER_NAME=$(echo "$LINE" | cut -f2)

          if [ -z "$CONTAINER_ID" ] || [ -z "$CONTAINER_NAME" ]; then
            echo "Skipping malformed line: '$LINE' - Missing ID or Name."
            exit 0
          fi

          echo "Processing container: $CONTAINER_NAME ($CONTAINER_ID)"

          if docker exec "$CONTAINER_ID" command -v setup-timezone >/dev/null 2>&1; then
            echo "  Using setup-timezone for $CONTAINER_NAME"
            docker exec "$CONTAINER_ID" setup-timezone -z America/New_York
          elif docker exec "$CONTAINER_ID" test -f /etc/timezone; then
            echo "  Manually setting timezone for $CONTAINER_NAME"
            docker exec "$CONTAINER_ID" sh -c "echo 'America/New_New_York' > /etc/timezone && cp /usr/share/zoneinfo/America/New_York /etc/localtime"
          else
            echo "  Could not determine timezone setup method for $CONTAINER_NAME. Skipping."
          fi