---
# =========================================================================
# PLAY 1: Update and upgrade apt packages on ALL SERVERS EXCEPT NTFY SERVER
# Ensures server01.krabs.me (ntfy server) remains available during this phase.
# =========================================================================
- name: Update and upgrade apt packages on ALL SERVERS EXCEPT NTFY SERVER
  hosts: all:!server01.krabs.me
  become: true
  environment:
    DEBIAN_FRONTEND: noninteractive
    NEEDRESTART_MODE: a
    NEEDRESTART_SUSPEND: '1'
    LC_ALL: C
    ANSIBLE_DEPRECATION_WARNINGS: 'False'
  tasks:
    - name: Release apt locks if held by stale processes
      ansible.builtin.shell: |
        if ps aux | grep -e '[a]pt-get' -e '[u]nattended-upgrade' | grep -v grep > /dev/null; then
          killall -9 apt-get || true
          killall -9 unattended-upgrade || true
          dpkg --configure -a --force-confold
        fi
      args:
        executable: /bin/bash
      when: ansible_pkg_mgr == 'apt'
      changed_when: false
      ignore_errors: true

    - name: Update packages with apt (apt-get update)
      when: ansible_pkg_mgr == 'apt'
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        lock_timeout: 300

    - name: Upgrade packages with apt (apt-get upgrade)
      when: ansible_pkg_mgr == 'apt'
      ansible.builtin.apt:
        upgrade: safe
        lock_timeout: 300
        dpkg_options: 'force-confdef,force-confold'
      register: apt_upgrade_result

    - name: Check if a reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
        get_checksum: no
      register: reboot_required_file

    - name: Send ntfy.sh update (if reboot is required)
      ansible.builtin.uri:
        url: "https://krabs.me"
        method: POST
        body: "{{ inventory_hostname }} is being rebooted after system update."
        timeout: 10
      when: reboot_required_file.stat.exists == true

    - name: Handle server reboot sequence
      when: reboot_required_file.stat.exists == true
      block:
        - name: Reset connection to avoid ssh persistence issues before reboot
          meta: reset_connection

        - name: Trigger detached reboot command
          ansible.builtin.shell: "sleep 2 && shutdown -r now"
          async: 1
          poll: 0

        - name: Wait for servers to come back online
          ansible.builtin.wait_for_connection:
            delay: 20
            timeout: 600

# =========================================================================
# PLAY 2: Update and upgrade apt packages on NTFY SERVER (server01.krabs.me)
# =========================================================================
- name: Update and upgrade apt packages on NTFY SERVER
  hosts: server01.krabs.me
  become: true
  environment:
    DEBIAN_FRONTEND: noninteractive
    NEEDRESTART_MODE: a
    NEEDRESTART_SUSPEND: '1'
    LC_ALL: C
    ANSIBLE_DEPRECATION_WARNINGS: 'False'
  tasks:
    - name: Release apt locks if held by stale processes
      ansible.builtin.shell: |
        if ps aux | grep -e '[a]pt-get' -e '[u]nattended-upgrade' | grep -v grep > /dev/null; then
          killall -9 apt-get || true
          killall -9 unattended-upgrade || true
          dpkg --configure -a --force-confold
        fi
      args:
        executable: /bin/bash
      when: ansible_pkg_mgr == 'apt'
      changed_when: false
      ignore_errors: true

    - name: Update packages with apt (apt-get update)
      when: ansible_pkg_mgr == 'apt'
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        lock_timeout: 300

    - name: Upgrade packages with apt (apt-get upgrade)
      when: ansible_pkg_mgr == 'apt'
      ansible.builtin.apt:
        upgrade: safe
        lock_timeout: 300
        dpkg_options: 'force-confdef,force-confold'
      register: apt_upgrade_result

    - name: Check if a reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
        get_checksum: no
      register: reboot_required_file

    - name: "Skipping ntfy.sh update from ntfy server (server01.krabs.me)"
      ansible.builtin.debug:
        msg: "server01.krabs.me requires a reboot but will not send an ntfy notification via its own ntfy service."
      when: reboot_required_file.stat.exists == true

    - name: Handle ntfy server reboot sequence
      when: reboot_required_file.stat.exists == true
      block:
        - name: Reset connection to avoid ssh persistence issues before reboot
          meta: reset_connection

        - name: Trigger detached reboot command
          ansible.builtin.shell: "sleep 2 && shutdown -r now"
          async: 1
          poll: 0

        - name: Wait for ntfy server to come back online
          ansible.builtin.wait_for_connection:
            delay: 20
            timeout: 600

# =========================================================================
# PLAY 3: Generate Human Readable Maintenance Report (Runs on remote host)
# =========================================================================
- name: Generate Human Readable Maintenance Report
  hosts: all
  gather_facts: false
  run_once: true  # Executes exactly once on a single remote machine from inventory
  tasks:
    - name: Output Execution Report
      ansible.builtin.debug:
        msg: |
          ======================================================================
                               SYSTEM MAINTENANCE REPORT                        
          ======================================================================
          {% for host in ansible_play_hosts_all %}
          SERVER: {{ host }}
          ----------------------------------------------------------------------
          {% if host not in groups['all'] or hostvars[host] is not defined or hostvars[host]['reboot_required_file'] is not defined %}
          * Status:             ❌ FAILED / UNREACHABLE
          * Details:            Check earlier job logs for the specific error.
          {% else %}
          * Status:             ✅ SUCCESS
          * Packages Upgraded:  {% if hostvars[host]['apt_upgrade_result']['changed'] | default(false) %}YES{% else %}NO (System up to date){% endif %}
          
          * Reboot Executed:    {% if hostvars[host]['reboot_required_file']['stat']['exists'] | default(false) %}YES (System restarted cleanly){% else %}NO (No restart required){% endif %}
          
          {% endif %}
          ======================================================================
          {% endfor %}
