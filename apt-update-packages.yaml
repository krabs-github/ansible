---
- name: Update and upgrade apt packages on ALL SERVERS EXCEPT NTFY SERVER
  # Target all hosts, then exclude 'server01.krabs.me'
  hosts: all:!server01.krabs.me 
  become: true

  environment:
    DEBIAN_FRONTEND: noninteractive
    NEEDRESTART_MODE: a
    LC_ALL: C

  tasks:
    # -------------------------------------------------------------------------
    # 1. PRE-CLEANUP
    # -------------------------------------------------------------------------
    - name: Release apt locks if held by stale processes
      ansible.builtin.shell: |
        if ps aux | grep -e '[a]pt-get' -e '[u]nattended-upgrade' | grep -v grep > /dev/null; then
          echo "Killing active apt processes"
          killall -9 apt-get || true
          killall -9 unattended-upgrade || true
          dpkg --configure -a --force-confold
        fi
      args:
        executable: /bin/bash
      when: ansible_pkg_mgr == 'apt'
      changed_when: false
      ignore_errors: true
      delay: 5

    # -------------------------------------------------------------------------
    # 2. UPDATE & UPGRADE
    # -------------------------------------------------------------------------
    - name: Update packages with apt (apt-get update)
      when: ansible_pkg_mgr == 'apt'
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        lock_timeout: 300
      register: apt_update_result

    - name: Upgrade packages with apt (apt-get upgrade)
      when: ansible_pkg_mgr == 'apt'
      ansible.builtin.apt:
        upgrade: safe
        lock_timeout: 300
        dpkg_options: 'force-confdef,force-confold'
      register: apt_upgrade_result

    # -------------------------------------------------------------------------
    # 3. REBOOT LOGIC
    # -------------------------------------------------------------------------
    - name: Check if a reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
        get_checksum: no
      register: reboot_required_file

    # For these non-ntfy servers, we send the notification
    - name: Send ntfy.sh update (if reboot is required)
      ansible.builtin.uri:
        url: "https://ntfy.krabs.me/Alerts"
        method: POST
        body: "{{ inventory_hostname }} is being rebooted after system update."
        timeout: 10
      when: reboot_required_file.stat.exists == true

    - name: Reset connection to avoid ssh persistence issues before reboot
      meta: reset_connection
      when: reboot_required_file.stat.exists == true

    - name: Reboot the server (if required)
      ansible.builtin.reboot:
        msg: "Rebooting due to system updates"
        pre_reboot_delay: 5
        post_reboot_delay: 10
        reboot_timeout: 600
      when: reboot_required_file.stat.exists == true
      delay: 15

# --- START SECOND PLAY: UPDATE NTFY SERVER LAST ---
- name: Update and upgrade apt packages on NTFY SERVER
  hosts: server01.krabs.me # Only target the ntfy server here
  become: true

  environment:
    DEBIAN_FRONTEND: noninteractive
    NEEDRESTART_MODE: a
    LC_ALL: C

  tasks:
    # (Repeat the same tasks as above for consistency)
    # -------------------------------------------------------------------------
    # 1. PRE-CLEANUP
    # -------------------------------------------------------------------------
    - name: Release apt locks if held by stale processes
      ansible.builtin.shell: |
        if ps aux | grep -e '[a]pt-get' -e '[u]nattended-upgrade' | grep -v grep > /dev/null; then
          echo "Killing active apt processes"
          killall -9 apt-get || true
          killall -9 unattended-upgrade || true
          dpkg --configure -a --force-confold
        fi
      args:
        executable: /bin/bash
      when: ansible_pkg_mgr == 'apt'
      changed_when: false
      ignore_errors: true
      delay: 5

    # -------------------------------------------------------------------------
    # 2. UPDATE & UPGRADE
    # -------------------------------------------------------------------------
    - name: Update packages with apt (apt-get update)
      when: ansible_pkg_mgr == 'apt'
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        lock_timeout: 300
      register: apt_update_result

    - name: Upgrade packages with apt (apt-get upgrade)
      when: ansible_pkg_mgr == 'apt'
      ansible.builtin.apt:
        upgrade: safe
        lock_timeout: 300
        dpkg_options: 'force-confdef,force-confold'
      register: apt_upgrade_result

    # -------------------------------------------------------------------------
    # 3. REBOOT LOGIC
    # -------------------------------------------------------------------------
    - name: Check if a reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
        get_checksum: no
      register: reboot_required_file

    # We generally skip ntfy notification FROM the ntfy server,
    # or you could configure a different, external notification method here
    # if you have one. For now, skipping is safest.
    - name: "Skipping ntfy.sh update from ntfy server (server01.krabs.me)"
      ansible.builtin.debug:
        msg: "server01.krabs.me requires a reboot but will not send an ntfy notification."
      when: reboot_required_file.stat.exists == true

    - name: Reset connection to avoid ssh persistence issues before reboot
      meta: reset_connection
      when: reboot_required_file.stat.exists == true

    - name: Reboot the server (if required)
      ansible.builtin.reboot:
        msg: "Rebooting due to system updates"
        pre_reboot_delay: 5
        post_reboot_delay: 10
        reboot_timeout: 600
      when: reboot_required_file.stat.exists == true
      delay: 15